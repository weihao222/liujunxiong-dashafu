<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>刘骏雄大傻福</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      overflow: hidden;
    }
    .text {
      font-size: 6vw;
      font-weight: 900;
      color: #ff4d4f;
      text-shadow: 4px 4px 0 #ffd666, 8px 8px 0 rgba(0,0,0,0.1);
      animation: pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
      letter-spacing: 0.05em;
      user-select: none;
    }
    @keyframes pop {
      0% { transform: scale(0) rotate(-10deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .sub {
      margin-top: 24px;
      font-size: 1.4vw;
      color: #fa8c16;
      opacity: 0;
      animation: fadeUp 0.6s 0.5s ease-out both;
    }
    @keyframes fadeUp {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div style="text-align:center;">
    <div class="text">刘骏雄大傻福</div>
    <div class="sub">🌟 大傻福驾到，通通闪开 🌟</div>
  </div>
</body>
</html>
