<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>刘骏雄大傻福</title>
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }
    #app {
      text-align: center;
      animation: fadeIn 0.5s ease-out both;
      position: relative;
      z-index: 1;
    }
    @keyframes fadeIn {
      0% { opacity:0; transform: translateY(20px); }
      100% { opacity:1; transform: translateY(0); }
    }
    .question {
      font-size: 3.5vw;
      font-weight: 900;
      color: #ff4d4f;
      text-shadow: 3px 3px 0 #ffd666;
      margin-bottom: 40px;
      letter-spacing: 0.05em;
    }
    .buttons { display: flex; gap: 30px; justify-content: center; }
    .btn {
      padding: 18px 50px;
      font-size: 2vw;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-yes {
      background: linear-gradient(135deg, #52c41a, #73d13d);
      color: #fff;
      box-shadow: 0 6px 20px rgba(82,196,26,0.4);
    }
    .btn-yes:hover { transform: scale(1.08); box-shadow: 0 8px 25px rgba(82,196,26,0.5); }

    /* 「否」按钮：绝对定位，可以自由跑路 */
    .btn-no {
      position: absolute;
      background: linear-gradient(135deg, #ff4d4f, #ff7875);
      color: #fff;
      box-shadow: 0 6px 20px rgba(255,77,79,0.4);
      transition: left 0.25s ease-out, top 0.25s ease-out, transform 0.2s;
      z-index: 10;
    }
    .btn-no:hover { transform: scale(1.08); box-shadow: 0 8px 25px rgba(255,77,79,0.5); }
    .btn-no.dodging { transition: left 0.15s ease-out, top 0.15s ease-out; }

    .result {
      font-size: 5vw;
      font-weight: 900;
      animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    .result-yes { color: #52c41a; text-shadow: 3px 3px 0 #b7eb8f; }
    .result-no  { color: #ff4d4f; text-shadow: 3px 3px 0 #ffd666; }
    @keyframes pop {
      0% { transform: scale(0) rotate(-5deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .btn-retry {
      margin-top: 40px;
      padding: 14px 45px;
      font-size: 1.5vw;
      font-weight: 600;
      border: 3px solid #fa8c16;
      border-radius: 50px;
      background: #fff;
      color: #fa8c16;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-retry:hover { background: #fa8c16; color: #fff; transform: scale(1.05); }
    .emoji { font-size: 4vw; margin-top: 20px; animation: fadeIn 0.5s 0.3s ease-out both; }

    /* 音乐提示 */
    #music-hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #fff;
      padding: 10px 28px;
      border-radius: 30px;
      font-size: 1.1vw;
      animation: fadeIn 1s 0.5s ease-out both;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    #music-hint.hidden { opacity: 0; pointer-events: none; }

    @keyframes dodge {
      0% { transform: scale(1); }
      50% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div id="music-hint">🎵 点击任意位置开启音效</div>

  <div id="app">
    <div class="question" id="question">🤔 刘骏雄是不是大傻福？</div>
    <div class="buttons" id="buttons">
      <button class="btn btn-yes" id="btn-yes" onclick="choose(true)">是</button>
    </div>
    <div id="result-area"></div>
  </div>

  <script>
    // ===== 用 Web Audio API 生成背景音效（不依赖外部文件）=====
    let audioCtx = null;
    let musicStarted = false;
    const hint = document.getElementById('music-hint');

    // 生成简单的旋律音效
    function playNote(freq, startTime, duration) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.08, startTime);
      gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(startTime);
      osc.stop(startTime + duration);
    }

    function playBGM() {
      if (!audioCtx) return;
      // 简单循环旋律（C大调）
      const notes = [523, 587, 659, 698, 783, 698, 659, 587]; // C D E F G F E D
      const noteLen = 0.3;
      const loopLen = notes.length * noteLen;

      function scheduleLoop() {
        const now = audioCtx.currentTime;
        for (let i = 0; i < notes.length; i++) {
          playNote(notes[i], now + i * noteLen, noteLen * 0.9);
        }
        // 循环
        setTimeout(scheduleLoop, loopLen * 1000 - 100);
      }
      scheduleLoop();
    }

    function startMusic() {
      if (musicStarted) return;
      musicStarted = true;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        playBGM();
        hint.textContent = '🎵 音效已开启';
        setTimeout(() => hint.classList.add('hidden'), 2000);
      } catch (e) {
        console.warn('音效启动失败:', e.message);
        hint.textContent = '⚠️ 音效不可用';
        setTimeout(() => hint.classList.add('hidden'), 2000);
      }
      document.body.removeEventListener('click', startMusic);
    }

    document.body.addEventListener('click', startMusic);

    // ===== 「否」躲猫猫按钮 =====
    const noBtn = document.createElement('button');
    noBtn.className = 'btn btn-no';
    noBtn.textContent = '否';
    noBtn.id = 'btn-no';
    document.body.appendChild(noBtn);

    function resetNoBtnPosition() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const bw = noBtn.offsetWidth || 120;
      const bh = noBtn.offsetHeight || 60;
      noBtn.style.left = (vw/2 + 80) + 'px';
      noBtn.style.top  = (vh/2 + 0) + 'px';
    }

    window.addEventListener('load', resetNoBtnPosition);
    window.addEventListener('resize', resetNoBtnPosition);

    noBtn.addEventListener('mouseenter', dodge);
    noBtn.addEventListener('touchstart', function(e) { e.preventDefault(); dodge(); });

    function dodge() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const bw = noBtn.offsetWidth;
      const bh = noBtn.offsetHeight;
      const maxX = vw - bw - 20;
      const maxY = vh - bh - 20;
      const minX = 20;
      const minY = 20;
      const newX = Math.random() * (maxX - minX) + minX;
      const newY = Math.random() * (maxY - minY) + minY;
      noBtn.classList.add('dodging');
      noBtn.style.left = newX + 'px';
      noBtn.style.top  = newY + 'px';
      noBtn.style.animation = 'dodge 0.15s ease-out';
      setTimeout(() => { noBtn.style.animation = ''; }, 150);
    }

    noBtn.onclick = function() { choose(false); };

    // ===== 主逻辑 =====
    function choose(isYes) {
      const question = document.getElementById('question');
      const buttons  = document.getElementById('buttons');
      const area     = document.getElementById('result-area');
      question.style.display = 'none';
      buttons.style.display  = 'none';
      noBtn.style.display    = 'none';

      if (isYes) {
        area.innerHTML = `
          <div class="result result-yes">✅ 真聪明！</div>
          <div class="emoji">🧠💡👍</div>
          <button class="btn-retry" onclick="reset()">🔄 再选一次</button>
        `;
      } else {
        area.innerHTML = `
          <div class="result result-no">❌ 你是大傻福！</div>
          <div class="emoji">😂🤪😜</div>
          <button class="btn-retry" onclick="reset()">🔄 再选一次</button>
        `;
      }
    }

    function reset() {
      document.getElementById('question').style.display = '';
      document.getElementById('buttons').style.display  = '';
      document.getElementById('result-area').innerHTML = '';
      noBtn.style.display = '';
      resetNoBtnPosition();
    }
  </script>
</body>
</html>
