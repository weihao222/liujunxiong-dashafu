<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>刘骏雄大傻福</title>
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      overflow: hidden;
      position: relative;
    }
    #app {
      text-align: center;
      animation: fadeIn 0.5s ease-out both;
      position: relative;
      z-index: 1;
    }
    @keyframes fadeIn {
      0% { opacity:0; transform: translateY(20px); }
      100% { opacity:1; transform: translateY(0); }
    }
    .question {
      font-size: 3.5vw;
      font-weight: 900;
      color: #ff4d4f;
      text-shadow: 3px 3px 0 #ffd666;
      margin-bottom: 40px;
      letter-spacing: 0.05em;
    }
    .buttons { display: flex; gap: 30px; justify-content: center; }
    .btn {
      padding: 18px 50px;
      font-size: 2vw;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-yes {
      background: linear-gradient(135deg, #52c41a, #73d13d);
      color: #fff;
      box-shadow: 0 6px 20px rgba(82,196,26,0.4);
    }
    .btn-yes:hover { transform: scale(1.08); box-shadow: 0 8px 25px rgba(82,196,26,0.5); }

    /* 「否」按钮：绝对定位，可以自由跑路 */
    .btn-no {
      position: absolute;
      background: linear-gradient(135deg, #ff4d4f, #ff7875);
      color: #fff;
      box-shadow: 0 6px 20px rgba(255,77,79,0.4);
      transition: left 0.25s ease-out, top 0.25s ease-out, transform 0.2s;
      z-index: 10;
    }
    .btn-no:hover { transform: scale(1.08); box-shadow: 0 8px 25px rgba(255,77,79,0.5); }
    .btn-no.dodging { transition: left 0.15s ease-out, top 0.15s ease-out; }

    .result {
      font-size: 5vw;
      font-weight: 900;
      animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    .result-yes { color: #52c41a; text-shadow: 3px 3px 0 #b7eb8f; }
    .result-no  { color: #ff4d4f; text-shadow: 3px 3px 0 #ffd666; }
    @keyframes pop {
      0% { transform: scale(0) rotate(-5deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .btn-retry {
      margin-top: 40px;
      padding: 14px 45px;
      font-size: 1.5vw;
      font-weight: 600;
      border: 3px solid #fa8c16;
      border-radius: 50px;
      background: #fff;
      color: #fa8c16;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-retry:hover { background: #fa8c16; color: #fff; transform: scale(1.05); }
    .emoji { font-size: 4vw; margin-top: 20px; animation: fadeIn 0.5s 0.3s ease-out both; }

    /* 跑路时的小动画 */
    @keyframes dodge {
      0% { transform: scale(1); }
      50% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- 「否」按钮，初始在按钮区域里，JS 会把它放到 body 里绝对定位 -->
  <div id="app">
    <div class="question" id="question">🤔 刘骏雄是不是大傻福？</div>
    <div class="buttons" id="buttons">
      <button class="btn btn-yes" id="btn-yes" onclick="choose(true)">是</button>
      <!-- 「否」按钮由 JS 接管，初始放这里占位 -->
    </div>
    <div id="result-area"></div>
  </div>

  <!-- 「否」按钮，由 JS 动态创建并放到 body 中 -->
  <script>
    const noBtn = document.createElement('button');
    noBtn.className = 'btn btn-no';
    noBtn.textContent = '否';
    noBtn.id = 'btn-no';

    // 把「否」按钮移到 body 下，方便绝对定位
    document.body.appendChild(noBtn);

    // 初始化「否」按钮位置（居中偏右）
    function resetNoBtnPosition() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const bw = noBtn.offsetWidth || 120;
      const bh = noBtn.offsetHeight || 60;
      // 初始放在中间偏右
      noBtn.style.left = (vw/2 + 80) + 'px';
      noBtn.style.top  = (vh/2 + 0) + 'px';
    }

    // 页面加载完再定位
    window.addEventListener('load', resetNoBtnPosition);
    window.addEventListener('resize', resetNoBtnPosition);

    // 鼠标靠近时跑路！
    noBtn.addEventListener('mouseenter', dodge);
    // 触摸屏：触摸开始时也跑
    noBtn.addEventListener('touchstart', function(e) { e.preventDefault(); dodge(); });

    function dodge() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const bw = noBtn.offsetWidth;
      const bh = noBtn.offsetHeight;

      // 计算安全范围（别跑出屏幕）
      const maxX = vw - bw - 20;
      const maxY = vh - bh - 20;
      const minX = 20;
      const minY = 20;

      // 随机新位置
      const newX = Math.random() * (maxX - minX) + minX;
      const newY = Math.random() * (maxY - minY) + minY;

      noBtn.classList.add('dodging');
      noBtn.style.left = newX + 'px';
      noBtn.style.top  = newY + 'px';

      // 跑掉时按钮会"抖一下"
      noBtn.style.animation = 'dodge 0.15s ease-out';
      setTimeout(() => { noBtn.style.animation = ''; }, 150);
    }

    // 点击「否」几乎不可能，但万一被抓到了…
    noBtn.onclick = function() { choose(false); };

    /* ===== 主逻辑 ===== */
    function choose(isYes) {
      const question = document.getElementById('question');
      const buttons  = document.getElementById('buttons');
      const area     = document.getElementById('result-area');

      question.style.display = 'none';
      buttons.style.display  = 'none';
      noBtn.style.display    = 'none';   // 隐藏跑路按钮

      if (isYes) {
        area.innerHTML = `
          <div class="result result-yes">✅ 真聪明！</div>
          <div class="emoji">🧠💡👍</div>
          <button class="btn-retry" onclick="reset()">🔄 再选一次</button>
        `;
      } else {
        area.innerHTML = `
          <div class="result result-no">❌ 你是大傻福！</div>
          <div class="emoji">😂🤪😜</div>
          <button class="btn-retry" onclick="reset()">🔄 再选一次</button>
        `;
      }
    }

    function reset() {
      document.getElementById('question').style.display = '';
      document.getElementById('buttons').style.display  = '';
      document.getElementById('result-area').innerHTML = '';
      noBtn.style.display = '';
      resetNoBtnPosition();   // 重置「否」按钮位置
    }
  </script>
</body>
</html>
